    .gradient-text {
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 50%, #2563eb 100%);

      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hover-glow {
      transition: all 0.3s ease;
    }

    .hover-glow:hover {
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
      transform: translateY(-2px);
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

    .card {
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(37, 99, 235, 0.1));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .fade-in {
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

      font-weight: 500;

      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(59, 130, 246, 0.3);
    }

    .filter-btn.active {
      background: rgba(59, 130, 246, 0.2);

      padding-bottom: 0.75rem;

    .category-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #60a5fa;
    }

    .category-count {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
    }

    .repo-card {
      position: relative;
    }

    .repo-card .repo-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #e2e8f0;
    }

    .repo-card .repo-org {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .repo-card .repo-icon {
      transition: transform 0.3s ease;
    }

    .repo-card:hover .repo-icon {

    }

    .squircle {
      clip-path: url(#squircle-clip);
      -webkit-clip-path: url(#squircle-clip);
    }

    
    /* Fallback for browsers without SVG clip-path support */
    @supports not (clip-path: url(#squircle-clip)) {
      .squircle {
        border-radius: 22%;
      }
      .squircle-lg {
        border-radius: 24%;
      }

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

    .hero-header::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 0;
    }

    .hero-header * {
      position: relative;
      z-index: 1;
    }

    .hero-header img {

      height: 120px;
      border-radius: 50%;
      border: 4px solid #60a5fa;
      margin-bottom: 20px;

      margin-bottom: 10px;
      font-weight: 700;
    }

    .hero-header p {
      color: #f1f5f9;
      font-size: 18px;

    .fixed-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(10, 15, 28, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(51, 65, 85, 0.5);

      transform: translateY(-100%);

      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);

    };

    const colorClasses = {
      blue: { gradient: "from-blue-500 to-blue-600", text: "text-blue-400", border: "border-blue-500/20" },
      green: { gradient: "from-green-500 to-green-600", text: "text-green-400", border: "border-green-500/20" },
      purple: { gradient: "from-purple-500 to-purple-600", text: "text-purple-400", border: "border-purple-500/20" },
      orange: { gradient: "from-orange-500 to-orange-600", text: "text-orange-400", border: "border-orange-500/20" },
      red: { gradient: "from-red-500 to-red-600", text: "text-red-400", border: "border-red-500/20" },
      pink: { gradient: "from-pink-500 to-pink-600", text: "text-pink-400", border: "border-pink-500/20" },
      indigo: { gradient: "from-indigo-500 to-indigo-600", text: "text-indigo-400", border: "border-indigo-500/20" },
      cyan: { gradient: "from-cyan-500 to-cyan-600", text: "text-cyan-400", border: "border-cyan-500/20" },
      teal: { gradient: "from-teal-500 to-teal-600", text: "text-teal-400", border: "border-teal-500/20" },
      amber: { gradient: "from-amber-500 to-amber-600", text: "text-amber-400", border: "border-amber-500/20" },
      lime: { gradient: "from-lime-500 to-lime-600", text: "text-lime-400", border: "border-lime-500/20" }
    };

    // State
    let currentFilter = 'all';
    let searchQuery = '';

    // Initialize
    function init() {
      renderCategories();
      setupEventListeners();
      updateStats();
      populateCategoryFilters();
    }

    // Populate category filters
    function populateCategoryFilters() {
      const filtersContainer = document.getElementById('categoryFilters');
      const allButton = filtersContainer.querySelector('[data-category="all"]');

      Object.keys(projectData).forEach(category => {
        const button = document.createElement('button');
        button.className = 'filter-btn category-filter';
        button.dataset.category = category;
        button.textContent = category;
        button.addEventListener('click', handleCategoryFilter);
        filtersContainer.appendChild(button);
      });
    }

    // Handle category filter
    function handleCategoryFilter(e) {
      const category = e.target.dataset.category;
      document.querySelectorAll('.category-filter').forEach(btn => btn.classList.remove('active'));
      e.target.classList.add('active');
      currentFilter = category;
      renderCategories();
    }

    // Render categories
    function renderCategories() {
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = '';

      Object.entries(projectData).forEach(([category, repos]) => {
        // Apply filters
        if (currentFilter !== 'all' && category !== currentFilter) return;

        const filteredRepos = repos.filter(repo => {
          if (!searchQuery) return true;
          return repo.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                 repo.desc.toLowerCase().includes(searchQuery.toLowerCase());
        });

        if (filteredRepos.length === 0) return;

        const config = categoryConfig[category] || { icon: "folder", color: "blue" };
        const colors = colorClasses[config.color];

        const section = document.createElement('div');
        section.className = 'category-section fade-in';

        const header = document.createElement('div');
        header.className = 'category-header';
        header.innerHTML = `
          <span class="material-symbols-outlined ${colors.text}">${config.icon}</span>
          <span class="category-title">${category}</span>
          <span class="category-count">${filteredRepos.length} repositories</span>
        `;

        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4';

        filteredRepos.forEach(repo => {
          const card = createRepoCard(repo, colors);
          grid.appendChild(card);
        });

        section.appendChild(header);
        section.appendChild(grid);
        container.appendChild(section);
      });

      if (container.children.length === 0) {
        container.innerHTML = `
          <div class="text-center py-12">
            <span class="material-symbols-outlined text-slate-600 text-6xl">search_off</span>
            <p class="text-slate-400 mt-4">No repositories found</p>
          </div>
        `;
      }
    }

    // Create repository card
    function createRepoCard(repo, colors) {
      const card = document.createElement('div');
      card.className = 'card repo-card glass rounded-xl p-4 border border-slate-700/50';

      // Private repos without a public URL get an antarctica.io explanation page link
      const slug = repo.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      const hasPublicUrl = repo.url && repo.url.trim() !== '';
      const privateUrl = !hasPublicUrl && repo.private ? `https://chevp.github.io/antarctica.io/#/projects/${slug}` : null;
      const effectiveUrl = hasPublicUrl ? repo.url : privateUrl;
      const opensExternally = hasPublicUrl;

      const statePill = repo.archived
        ? `<span class="text-[10px] uppercase tracking-wider font-semibold px-2 py-0.5 rounded-full bg-red-500/15 text-red-300 border border-red-500/30">Archived</span>`
        : (privateUrl
            ? `<span class="text-[10px] uppercase tracking-wider font-semibold px-2 py-0.5 rounded-full bg-blue-500/15 text-blue-300 border border-blue-500/30">Private</span>`
            : '');

      const arrowIcon = opensExternally
        ? `<span class="material-symbols-outlined ${colors.text}">open_in_new</span>`
        : (privateUrl ? `<span class="material-symbols-outlined ${colors.text}">arrow_forward</span>` : '');

      card.innerHTML = `
        <div class="flex items-start justify-between mb-3">
          <div class="w-12 h-12 squircle bg-gradient-to-br ${colors.gradient} flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined text-white text-2xl repo-icon">folder</span>
          </div>
          <div class="flex items-center gap-2">${statePill}${arrowIcon}</div>
        </div>
        <h3 class="repo-name">${repo.name}</h3>
        <p class="text-sm text-slate-400 mb-2">${repo.desc}</p>
        <div class="flex items-center gap-2">
          <span class="text-xs px-2 py-1 rounded ${colors.border} ${colors.text} bg-opacity-10">
            ${repo.org || 'projects'}
          </span>
        </div>
      `;

      if (effectiveUrl) {
        card.addEventListener('click', () => {
          if (opensExternally) window.open(effectiveUrl, '_blank');
          else window.location.href = effectiveUrl;
        });
      } else {
        card.style.cursor = 'default';
        card.classList.remove('card');
      }

      return card;
    }

    // Update stats
    function updateStats() {
      const totalRepos = Object.values(projectData).reduce((sum, repos) => sum + repos.length, 0);
      const totalCategories = Object.keys(projectData).length;

      document.getElementById('totalRepos').textContent = `${totalRepos} Repositories`;
      document.getElementById('totalCategories').textContent = `${totalCategories} Categories`;
    }

    // Handle fixed header visibility on scroll
    function handleScroll() {
      const fixedHeader = document.getElementById('fixedHeader');
      const scrollPosition = window.pageYOffset;
      const threshold = 300; // Show fixed header after scrolling 300px

      if (scrollPosition > threshold) {
        fixedHeader.classList.add('visible');
      } else {
        fixedHeader.classList.remove('visible');
      }
    }

    // Setup event listeners
    function setupEventListeners() {
      // Search toggle (both static and fixed header)
      const searchToggle = () => {
        const searchBar = document.getElementById('searchBar');
        searchBar.classList.toggle('hidden');
        if (!searchBar.classList.contains('hidden')) {
          document.getElementById('searchInput').focus();
        }
      };

      document.getElementById('searchToggleFixed').addEventListener('click', searchToggle);

      // Filter toggle (both static and fixed header)
      const filterToggle = () => {
        document.getElementById('filtersPanel').classList.toggle('hidden');
      };

      document.getElementById('filterToggleFixed').addEventListener('click', filterToggle);

      // Search input
      document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderCategories();
      });

      // Clear filters
      document.getElementById('clearFilters').addEventListener('click', () => {
        currentFilter = 'all';
        searchQuery = '';
        document.getElementById('searchInput').value = '';
        document.querySelectorAll('.category-filter').forEach(btn => btn.classList.remove('active'));
        document.querySelector('.category-filter[data-category="all"]').classList.add('active');
        renderCategories();
      });

      // Scroll handler for fixed header
      window.addEventListener('scroll', handleScroll);
    }

    // Run on load
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
