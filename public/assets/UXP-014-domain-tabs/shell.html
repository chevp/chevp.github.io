<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cura – UXP-014 Domain Tabs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #232733;
      --surface-3: #2a2e3b;
      --border: #2e3344;
      --border-light: #3a3f52;
      --text: #e4e6ed;
      --text-muted: #8b8fa3;
      --text-dim: #5c6078;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --green: #00b894;
      --orange: #fdcb6e;
      --red: #ff7675;
      --blue: #74b9ff;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

    /* === WINDOW FRAME === */
    .window {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* === TITLEBAR (simulates Electron titlebar) === */
    .titlebar {
      display: flex;
      align-items: center;
      height: 38px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
      padding-left: 12px;
    }

    .titlebar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: 16px;
      flex-shrink: 0;
    }
    .titlebar-logo-icon {
      width: 22px; height: 22px; border-radius: 6px;
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      display: flex; align-items: center; justify-content: center;
    }
    .titlebar-logo-icon .material-symbols-outlined { font-size: 14px; color: #fff; }
    .titlebar-logo-text { font-size: 13px; font-weight: 700; color: var(--text-muted); }

    /* === TAB BAR === */
    .tabbar {
      display: flex;
      align-items: flex-end;
      flex: 1;
      overflow-x: auto;
      gap: 1px;
      padding-top: 4px;
    }
    .tabbar::-webkit-scrollbar { height: 0; }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 8px 8px 0 0;
      white-space: nowrap;
      position: relative;
      -webkit-app-region: no-drag;
      min-width: 0;
      max-width: 200px;
    }
    .tab:hover { background: var(--surface); color: var(--text); }
    .tab.active {
      background: var(--surface);
      color: var(--text);
    }
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
    }
    .tab .material-symbols-outlined { font-size: 16px; flex-shrink: 0; }
    .tab-label { overflow: hidden; text-overflow: ellipsis; }

    .tab-close {
      width: 18px; height: 18px; border-radius: 4px;
      background: none; border: none;
      color: var(--text-dim);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      opacity: 0;
      transition: all 0.15s;
    }
    .tab:hover .tab-close { opacity: 1; }
    .tab-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .tab-close .material-symbols-outlined { font-size: 14px; }

    .tab-new {
      width: 28px; height: 28px; border-radius: 6px;
      background: none; border: none;
      color: var(--text-dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin: 0 8px;
      transition: all 0.15s;
      -webkit-app-region: no-drag;
    }
    .tab-new:hover { background: var(--surface); color: var(--text); }
    .tab-new .material-symbols-outlined { font-size: 18px; }

    /* Window controls (simulated) */
    .window-controls {
      display: flex;
      align-items: center;
      gap: 0;
      margin-left: auto;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }
    .wc-btn {
      width: 46px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      transition: background 0.1s;
    }
    .wc-btn:hover { background: rgba(255,255,255,0.07); }
    .wc-btn.close:hover { background: #e81123; color: #fff; }
    .wc-btn .material-symbols-outlined { font-size: 18px; }

    /* === CONTENT AREA === */
    .content {
      flex: 1;
      background: var(--surface);
      overflow: hidden;
      position: relative;
    }

    .content iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
    .content iframe.active { display: block; }

    /* === NEW TAB MENU (dropdown from + button) === */
    .new-tab-menu {
      display: none;
      position: absolute;
      top: 38px;
      right: 60px;
      z-index: 100;
      background: var(--surface-2);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      min-width: 240px;
      padding: 8px 0;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .new-tab-menu.visible { display: block; }
    .new-tab-menu-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-dim); padding: 8px 16px 4px;
    }
    .new-tab-menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer; transition: background 0.12s;
      font-size: 13px; color: var(--text);
    }
    .new-tab-menu-item:hover { background: rgba(255,255,255,0.05); }
    .new-tab-menu-item .material-symbols-outlined { font-size: 20px; }
    .new-tab-menu-item .ntm-label { flex: 1; }
    .new-tab-menu-item .ntm-shortcut { font-size: 10px; color: var(--text-dim); }

    /* Color dots for domains */
    .domain-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .domain-dot.clients { background: var(--accent); }
    .domain-dot.documentation { background: var(--green); }
    .domain-dot.staff { background: var(--blue); }
    .domain-dot.medication { background: var(--orange); }
    .domain-dot.reports { background: var(--red); }
    .domain-dot.ai { background: linear-gradient(135deg, var(--accent), #8b5cf6); }

    /* User profile in titlebar */
    .titlebar-profile {
      display: flex; align-items: center; gap: 6px;
      padding: 0 12px; margin-left: 8px;
      font-size: 11px; color: var(--text-muted);
      -webkit-app-region: no-drag;
    }
    .titlebar-profile-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700;
    }
  </style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="titlebar-logo">
      <div class="titlebar-logo-icon">
        <span class="material-symbols-outlined">health_and_safety</span>
      </div>
      <span class="titlebar-logo-text">Cura</span>
    </div>

    <div class="tabbar" id="tabbar"></div>

    <button class="tab-new" id="newTabBtn" title="Neuer Tab (Ctrl+T)">
      <span class="material-symbols-outlined">add</span>
    </button>

    <div class="titlebar-profile">
      <div class="titlebar-profile-avatar">MK</div>
      <span>M. Keller</span>
    </div>

    <div class="window-controls">
      <button class="wc-btn"><span class="material-symbols-outlined">remove</span></button>
      <button class="wc-btn"><span class="material-symbols-outlined">crop_square</span></button>
      <button class="wc-btn close"><span class="material-symbols-outlined">close</span></button>
    </div>
  </div>

  <div class="content" id="content"></div>
</div>

<div class="new-tab-menu" id="newTabMenu">
  <div class="new-tab-menu-title">Domain öffnen</div>
  <div class="new-tab-menu-item" data-domain="clients">
    <span class="domain-dot clients"></span>
    <span class="material-symbols-outlined" style="color:var(--accent)">person</span>
    <span class="ntm-label">Klienten</span>
  </div>
  <div class="new-tab-menu-item" data-domain="documentation">
    <span class="domain-dot documentation"></span>
    <span class="material-symbols-outlined" style="color:var(--green)">description</span>
    <span class="ntm-label">Dokumentation</span>
  </div>
  <div class="new-tab-menu-item" data-domain="staff">
    <span class="domain-dot staff"></span>
    <span class="material-symbols-outlined" style="color:var(--blue)">badge</span>
    <span class="ntm-label">Personal</span>
  </div>
  <div class="new-tab-menu-item" data-domain="medication">
    <span class="domain-dot medication"></span>
    <span class="material-symbols-outlined" style="color:var(--orange)">medication</span>
    <span class="ntm-label">Medikation</span>
  </div>
  <div class="new-tab-menu-item" data-domain="ai">
    <span class="domain-dot ai"></span>
    <span class="material-symbols-outlined" style="color:var(--accent-light)">auto_awesome</span>
    <span class="ntm-label">AI Workspace</span>
  </div>
</div>

<script>
  // ===== TAB MANAGEMENT =====
  const domainConfig = {
    clients:       { label: 'Klienten',      icon: 'person',      color: 'var(--accent)',  src: 'domain-clients.html' },
    documentation: { label: 'Dokumentation', icon: 'description', color: 'var(--green)',   src: 'domain-documentation.html' },
    staff:         { label: 'Personal',      icon: 'badge',       color: 'var(--blue)',    src: 'domain-staff.html' },
    medication:    { label: 'Medikation',    icon: 'medication',  color: 'var(--orange)',  src: 'domain-medication.html' },
    ai:            { label: 'AI Workspace',  icon: 'auto_awesome',color: 'var(--accent-light)', src: 'domain-ai.html' }
  };

  let tabs = [];
  let activeTabId = null;
  let tabIdCounter = 0;

  // BroadcastChannel for cross-tab communication
  const channel = new BroadcastChannel('cura-tabs');

  channel.onmessage = (e) => {
    const msg = e.data;
    if (msg.type === 'open-tab') {
      openTab(msg.domain, msg.label || null, msg.entity || null);
    }
  };

  function openTab(domain, customLabel, entity) {
    const config = domainConfig[domain];
    if (!config) return;

    tabIdCounter++;
    const id = 'tab-' + tabIdCounter;
    const label = customLabel || config.label;

    // Create iframe
    const iframe = document.createElement('iframe');
    let src = config.src;
    if (entity) {
      src += '?entity=' + encodeURIComponent(entity);
    }
    iframe.src = src;
    iframe.id = 'iframe-' + id;
    iframe.dataset.tabId = id;
    document.getElementById('content').appendChild(iframe);

    tabs.push({ id, domain, label, entity, iframeId: 'iframe-' + id });

    activateTab(id);
    renderTabbar();
  }

  function closeTab(id) {
    const idx = tabs.findIndex(t => t.id === id);
    if (idx === -1) return;

    // Remove iframe
    const iframe = document.getElementById(tabs[idx].iframeId);
    if (iframe) iframe.remove();

    tabs.splice(idx, 1);

    if (activeTabId === id) {
      if (tabs.length > 0) {
        const newIdx = Math.min(idx, tabs.length - 1);
        activateTab(tabs[newIdx].id);
      } else {
        activeTabId = null;
      }
    }

    renderTabbar();
  }

  function activateTab(id) {
    activeTabId = id;

    // Show/hide iframes
    document.querySelectorAll('#content iframe').forEach(f => {
      f.classList.toggle('active', f.dataset.tabId === id);
    });

    renderTabbar();

    // Update document title
    const tab = tabs.find(t => t.id === id);
    if (tab) {
      document.title = `${tab.label} – Cura`;
    }
  }

  function renderTabbar() {
    const bar = document.getElementById('tabbar');
    bar.innerHTML = tabs.map(t => {
      const config = domainConfig[t.domain] || {};
      return `
        <button class="tab ${t.id === activeTabId ? 'active' : ''}" data-id="${t.id}" title="${t.label}">
          <span class="domain-dot ${t.domain}"></span>
          <span class="material-symbols-outlined" style="color:${config.color};font-size:15px;">${config.icon}</span>
          <span class="tab-label">${t.label}</span>
          <button class="tab-close" data-close="${t.id}" title="Tab schliessen">
            <span class="material-symbols-outlined">close</span>
          </button>
        </button>
      `;
    }).join('');

    bar.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', (e) => {
        if (e.target.closest('.tab-close')) return;
        activateTab(btn.dataset.id);
      });

      // Middle click to close
      btn.addEventListener('auxclick', (e) => {
        if (e.button === 1) {
          e.preventDefault();
          closeTab(btn.dataset.id);
        }
      });
    });

    bar.querySelectorAll('.tab-close').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeTab(btn.dataset.close);
      });
    });
  }

  // New tab menu
  const newTabBtn = document.getElementById('newTabBtn');
  const newTabMenu = document.getElementById('newTabMenu');

  newTabBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    newTabMenu.classList.toggle('visible');
  });

  document.addEventListener('click', () => {
    newTabMenu.classList.remove('visible');
  });

  newTabMenu.querySelectorAll('.new-tab-menu-item').forEach(item => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const domain = item.dataset.domain;
      if (e.ctrlKey || e.metaKey) {
        // Open in new browser tab
        window.open(domainConfig[domain].src, '_blank');
      } else {
        openTab(domain);
      }
      newTabMenu.classList.remove('visible');
    });

    // Middle click = new browser tab
    item.addEventListener('auxclick', (e) => {
      if (e.button === 1) {
        e.preventDefault();
        window.open(domainConfig[item.dataset.domain].src, '_blank');
        newTabMenu.classList.remove('visible');
      }
    });
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    // Ctrl+T = new tab menu
    if ((e.ctrlKey || e.metaKey) && e.key === 't') {
      e.preventDefault();
      newTabMenu.classList.toggle('visible');
    }
    // Ctrl+W = close active tab
    if ((e.ctrlKey || e.metaKey) && e.key === 'w') {
      e.preventDefault();
      if (activeTabId) closeTab(activeTabId);
    }
    // Ctrl+1-5 = switch tabs
    if ((e.ctrlKey || e.metaKey) && e.key >= '1' && e.key <= '9') {
      e.preventDefault();
      const idx = parseInt(e.key) - 1;
      if (tabs[idx]) activateTab(tabs[idx].id);
    }
  });

  // Listen for messages from iframes (cross-domain navigation)
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'open-tab') {
      openTab(e.data.domain, e.data.label || null, e.data.entity || null);
    }
    if (e.data && e.data.type === 'update-tab-label') {
      const tab = tabs.find(t => {
        const iframe = document.getElementById(t.iframeId);
        return iframe && iframe.contentWindow === e.source;
      });
      if (tab) {
        tab.label = e.data.label;
        renderTabbar();
        if (tab.id === activeTabId) {
          document.title = `${tab.label} – Cura`;
        }
      }
    }
  });

  // === INIT: open default tabs ===
  openTab('clients');
  openTab('documentation');
  openTab('ai');
  activateTab(tabs[0].id);
</script>

</body>
</html>
