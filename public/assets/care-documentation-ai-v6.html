<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cura – UXP-013 Three-Pane AI Workspace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "@material/web/": "https://esm.run/@material/web/"
    }
  }
  </script>
  <script type="module">
    import '@material/web/all.js';
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

    :root {
      color-scheme: dark;
      --md-sys-color-primary: #c4b5fd;
      --md-sys-color-on-primary: #2e1065;
      --md-sys-color-primary-container: #4c1d95;
      --md-sys-color-on-primary-container: #e0d7fe;
      --md-sys-color-secondary: #a29bfe;
      --md-sys-color-on-secondary: #1a1040;
      --md-sys-color-secondary-container: #3b3070;
      --md-sys-color-tertiary: #74b9ff;
      --md-sys-color-on-tertiary: #003258;
      --md-sys-color-error: #ff7675;
      --md-sys-color-on-error: #601410;
      --md-sys-color-surface: #1a1d27;
      --md-sys-color-surface-dim: #0f1117;
      --md-sys-color-surface-bright: #2a2e3b;
      --md-sys-color-surface-container-lowest: #0f1117;
      --md-sys-color-surface-container-low: #161922;
      --md-sys-color-surface-container: #232733;
      --md-sys-color-surface-container-high: #2a2e3b;
      --md-sys-color-surface-container-highest: #353a4a;
      --md-sys-color-on-surface: #e4e6ed;
      --md-sys-color-on-surface-variant: #8b8fa3;
      --md-sys-color-outline: #2e3344;
      --md-sys-color-outline-variant: #3a3f52;
      --md-sys-color-inverse-surface: #e4e6ed;
      --md-sys-color-inverse-on-surface: #1a1d27;
      --cura-accent: #6c5ce7;
      --cura-accent-light: #a29bfe;
      --ai-panel-bg: #1e1b2e;
      --ai-panel-border: #352f5a;

      --md-sys-typescale-body-medium-font: 'Inter', sans-serif;
      --md-sys-typescale-body-large-font: 'Inter', sans-serif;
      --md-sys-typescale-label-large-font: 'Inter', sans-serif;
      --md-sys-typescale-title-medium-font: 'Inter', sans-serif;

      --md-filled-text-field-container-color: var(--md-sys-color-surface-container);
      --md-filled-text-field-label-text-color: var(--md-sys-color-on-surface-variant);
      --md-filled-text-field-input-text-color: var(--md-sys-color-on-surface);
      --md-filled-text-field-focus-active-indicator-color: var(--md-sys-color-primary);
      --md-outlined-text-field-outline-color: var(--md-sys-color-outline);
      --md-outlined-text-field-focus-outline-color: var(--md-sys-color-primary);
      --md-outlined-text-field-input-text-color: var(--md-sys-color-on-surface);
      --md-outlined-text-field-label-text-color: var(--md-sys-color-on-surface-variant);
      --md-filled-button-container-color: var(--md-sys-color-primary);
      --md-filled-button-label-text-color: var(--md-sys-color-on-primary);
      --md-outlined-button-outline-color: var(--md-sys-color-outline);
      --md-outlined-button-label-text-color: var(--md-sys-color-on-surface);
      --md-icon-button-icon-color: var(--md-sys-color-on-surface-variant);
      --md-list-container-color: transparent;
      --md-list-item-label-text-color: var(--md-sys-color-on-surface);
      --md-list-item-supporting-text-color: var(--md-sys-color-on-surface-variant);
      --md-divider-color: var(--md-sys-color-outline);
    }

    html, body { height: 100%; overflow: hidden; background: var(--md-sys-color-surface-dim); color: var(--md-sys-color-on-surface); }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* === THREE-PANE LAYOUT === */
    .app-shell {
      display: grid;
      grid-template-columns: 72px 320px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* === LEFT SIDEBAR === */
    aside.sidebar {
      background: var(--md-sys-color-surface-dim);
      border-right: 1px solid var(--md-sys-color-outline);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 4px;
      z-index: 10;
    }

    .sidebar-logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--cura-accent-light);
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    nav.entity-nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 10px 8px 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 60px;
      text-align: center;
      border: none;
      background: none;
      color: var(--md-sys-color-on-surface-variant);
    }

    .nav-item:hover {
      background: var(--md-sys-color-surface-container);
      color: var(--md-sys-color-on-surface);
    }

    .nav-item.active {
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
    }

    .nav-item .material-symbols-outlined { font-size: 24px; }
    .nav-item-label { font-size: 10px; font-weight: 500; line-height: 1.2; }

    .sidebar-profile {
      margin-top: auto;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--md-sys-color-surface-container-high);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .sidebar-profile:hover { background: var(--md-sys-color-surface-container-highest); }
    .sidebar-profile .material-symbols-outlined { font-size: 20px; color: var(--md-sys-color-on-surface-variant); }

    /* === MIDDLE PANE - LIST === */
    section.list-pane {
      background: var(--md-sys-color-surface-container-low);
      border-right: 1px solid var(--md-sys-color-outline);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .list-header {
      padding: 20px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-bottom: 1px solid var(--md-sys-color-outline);
    }

    .list-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .list-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--md-sys-color-on-surface);
    }

    .list-count {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      background: var(--md-sys-color-surface-container-high);
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: 500;
    }

    .list-search {
      position: relative;
    }

    .list-search input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border-radius: 10px;
      border: 1px solid var(--md-sys-color-outline);
      background: var(--md-sys-color-surface-container);
      color: var(--md-sys-color-on-surface);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .list-search input::placeholder { color: var(--md-sys-color-on-surface-variant); }
    .list-search input:focus { border-color: var(--cura-accent-light); }

    .list-search .material-symbols-outlined {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: var(--md-sys-color-on-surface-variant);
    }

    .list-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .list-body::-webkit-scrollbar { width: 4px; }
    .list-body::-webkit-scrollbar-track { background: transparent; }
    .list-body::-webkit-scrollbar-thumb { background: var(--md-sys-color-outline-variant); border-radius: 4px; }

    .record-card {
      padding: 14px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-bottom: 4px;
      border: 1px solid transparent;
    }

    .record-card:hover {
      background: var(--md-sys-color-surface-container);
    }

    .record-card.active {
      background: var(--md-sys-color-surface-container-high);
      border-color: var(--cura-accent);
    }

    .record-card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--md-sys-color-on-surface);
      margin-bottom: 3px;
    }

    .record-card-subtitle {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 8px;
    }

    .record-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.green { background: rgba(0, 184, 148, 0.15); color: #00b894; }
    .status-badge.yellow { background: rgba(253, 203, 110, 0.15); color: #fdcb6e; }
    .status-badge.red { background: rgba(255, 118, 117, 0.15); color: #ff7675; }
    .status-badge.blue { background: rgba(116, 185, 255, 0.15); color: #74b9ff; }
    .status-badge.purple { background: rgba(162, 155, 254, 0.15); color: #a29bfe; }
    .status-badge.gray { background: rgba(139, 143, 163, 0.15); color: #8b8fa3; }

    .record-card-time {
      font-size: 11px;
      color: var(--md-sys-color-on-surface-variant);
    }

    .new-record-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: calc(100% - 16px);
      margin: 8px;
      padding: 10px;
      border-radius: 10px;
      border: 1px dashed var(--md-sys-color-outline-variant);
      background: transparent;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .new-record-btn:hover {
      border-color: var(--cura-accent-light);
      color: var(--cura-accent-light);
      background: rgba(108, 92, 231, 0.05);
    }
    .new-record-btn .material-symbols-outlined { font-size: 18px; }

    /* === RIGHT PANE - WORKSPACE === */
    main.workspace {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--md-sys-color-surface);
    }

    .workspace-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--md-sys-color-outline);
      min-height: 56px;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--md-sys-color-on-surface-variant);
    }
    .breadcrumb span { cursor: pointer; }
    .breadcrumb span:hover { color: var(--md-sys-color-on-surface); }
    .breadcrumb .bc-active { color: var(--md-sys-color-on-surface); font-weight: 500; }
    .breadcrumb .material-symbols-outlined { font-size: 16px; }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--md-sys-color-outline);
      background: transparent;
      color: var(--md-sys-color-on-surface-variant);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover {
      background: var(--md-sys-color-surface-container);
      color: var(--md-sys-color-on-surface);
    }
    .action-btn .material-symbols-outlined { font-size: 16px; }

    .ai-toggle-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--ai-panel-border);
      background: rgba(108, 92, 231, 0.1);
      color: var(--cura-accent-light);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ai-toggle-btn:hover { background: rgba(108, 92, 231, 0.2); }
    .ai-toggle-btn.active { background: var(--cura-accent); color: #fff; border-color: var(--cura-accent); }
    .ai-toggle-btn .material-symbols-outlined { font-size: 16px; }

    /* === WORKSPACE CONTENT AREA === */
    .workspace-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .detail-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .detail-area::-webkit-scrollbar { width: 6px; }
    .detail-area::-webkit-scrollbar-track { background: transparent; }
    .detail-area::-webkit-scrollbar-thumb { background: var(--md-sys-color-outline-variant); border-radius: 4px; }

    /* Detail header */
    .detail-header {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
    }

    .detail-avatar {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: var(--md-sys-color-primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .detail-avatar .material-symbols-outlined {
      font-size: 32px;
      color: var(--md-sys-color-on-primary-container);
    }

    .detail-header-info { flex: 1; }
    .detail-header-info h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .detail-header-info p {
      font-size: 13px;
      color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 8px;
    }

    /* Tabs */
    .detail-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--md-sys-color-outline);
      margin-bottom: 24px;
    }

    .detail-tab {
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface-variant);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .detail-tab:hover { color: var(--md-sys-color-on-surface); }
    .detail-tab.active {
      color: var(--cura-accent-light);
      border-bottom-color: var(--cura-accent-light);
    }

    /* Detail sections */
    .detail-section { margin-bottom: 24px; }

    .detail-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--md-sys-color-on-surface);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .detail-section-title .material-symbols-outlined { font-size: 18px; color: var(--cura-accent-light); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 24px;
    }

    .detail-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .detail-field-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .detail-field-value {
      font-size: 14px;
      color: var(--md-sys-color-on-surface);
    }

    .detail-tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .detail-tag {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--md-sys-color-surface-container-high);
      color: var(--md-sys-color-on-surface);
    }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: 12px; }

    .timeline-item {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--md-sys-color-surface-container);
    }

    .timeline-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--md-sys-color-surface-container-high);
    }
    .timeline-icon .material-symbols-outlined { font-size: 16px; color: var(--cura-accent-light); }

    .timeline-content { flex: 1; }
    .timeline-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .timeline-desc { font-size: 12px; color: var(--md-sys-color-on-surface-variant); }
    .timeline-time { font-size: 11px; color: var(--md-sys-color-on-surface-variant); white-space: nowrap; }

    /* Medication table */
    .med-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .med-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface-variant);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--md-sys-color-outline);
    }
    .med-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--md-sys-color-outline);
      color: var(--md-sys-color-on-surface);
    }

    /* Document list */
    .doc-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--md-sys-color-surface-container);
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .doc-item:hover { background: var(--md-sys-color-surface-container-high); }
    .doc-item-icon {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: var(--md-sys-color-surface-container-high);
    }
    .doc-item-icon .material-symbols-outlined { font-size: 18px; color: var(--cura-accent-light); }
    .doc-item-info { flex: 1; }
    .doc-item-name { font-size: 13px; font-weight: 500; }
    .doc-item-meta { font-size: 11px; color: var(--md-sys-color-on-surface-variant); }

    /* === AI PANEL === */
    .ai-panel {
      width: 360px;
      background: var(--ai-panel-bg);
      border-left: 1px solid var(--ai-panel-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.3s ease, opacity 0.3s ease;
    }

    .ai-panel.hidden {
      width: 0;
      border-left: none;
      opacity: 0;
      pointer-events: none;
    }

    .ai-panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--ai-panel-border);
      min-height: 56px;
    }

    .ai-panel-icon {
      width: 32px; height: 32px; border-radius: 10px;
      background: linear-gradient(135deg, var(--cura-accent), #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ai-panel-icon .material-symbols-outlined { font-size: 18px; color: #fff; }

    .ai-panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--md-sys-color-on-surface);
      line-height: 1.3;
    }
    .ai-panel-subtitle {
      font-size: 11px;
      color: var(--cura-accent-light);
    }

    .ai-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ai-panel-body::-webkit-scrollbar { width: 4px; }
    .ai-panel-body::-webkit-scrollbar-track { background: transparent; }
    .ai-panel-body::-webkit-scrollbar-thumb { background: var(--ai-panel-border); border-radius: 4px; }

    .ai-suggestion {
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(108, 92, 231, 0.08);
      border: 1px solid rgba(108, 92, 231, 0.15);
      transition: all 0.2s;
      cursor: default;
    }
    .ai-suggestion:hover {
      background: rgba(108, 92, 231, 0.14);
      border-color: rgba(108, 92, 231, 0.25);
    }

    .ai-suggestion-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .ai-suggestion-header .material-symbols-outlined {
      font-size: 16px;
    }
    .ai-suggestion-icon-info { color: var(--md-sys-color-tertiary); }
    .ai-suggestion-icon-warning { color: #fdcb6e; }
    .ai-suggestion-icon-error { color: var(--md-sys-color-error); }
    .ai-suggestion-icon-action { color: #00b894; }

    .ai-suggestion-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--md-sys-color-on-surface);
    }

    .ai-suggestion-desc {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .ai-suggestion-action {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--cura-accent-light);
      cursor: pointer;
      padding: 4px 0;
      background: none;
      border: none;
      transition: color 0.2s;
    }
    .ai-suggestion-action:hover { color: #c4b5fd; }
    .ai-suggestion-action .material-symbols-outlined { font-size: 14px; }

    .ai-panel-input {
      padding: 12px 16px;

  function renderNav() {
    const nav = document.getElementById('entityNav');
    nav.innerHTML = entityTypes.map(et => `
      <button class="nav-item ${et.key === activeEntityType ? 'active' : ''}" data-key="${et.key}">
        <span class="material-symbols-outlined">${et.icon}</span>
        <span class="nav-item-label">${et.label}</span>
      </button>
    `).join('');

    nav.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        activeEntityType = btn.dataset.key;
        activeRecordId = null;
        activeTab = 'uebersicht';
        searchQuery = '';
        document.getElementById('searchInput').value = '';
        renderAll();
      });
    });
  }

  function getEntityLabel(key) {
    const et = entityTypes.find(e => e.key === key);
    return et ? et.label : key;
  }

  function getEntityIcon(key) {
    const et = entityTypes.find(e => e.key === key);
    return et ? et.icon : 'folder';
  }

  function getFilteredRecords() {
    const records = data[activeEntityType] || [];
    if (!searchQuery) return records;
    const q = searchQuery.toLowerCase();
    return records.filter(r =>
      r.name.toLowerCase().includes(q) ||
      r.subtitle.toLowerCase().includes(q) ||
      r.status.toLowerCase().includes(q)
    );
  }

  function renderList() {
    const records = getFilteredRecords();
    const label = getEntityLabel(activeEntityType);

    document.getElementById('listTitle').textContent = label;
    document.getElementById('listCount').textContent = records.length;

    const body = document.getElementById('listBody');
    if (records.length === 0) {
      body.innerHTML = `<div class="empty-state"><span class="material-symbols-outlined">search_off</span><p>Keine Ergebnisse</p></div>`;
      return;
    }

    body.innerHTML = records.map(r => `
      <div class="record-card ${r.id === activeRecordId ? 'active' : ''}" data-id="${r.id}">
        <div class="record-card-name">${r.name}</div>
        <div class="record-card-subtitle">${r.subtitle}</div>
        <div class="record-card-footer">
          <span class="status-badge ${r.statusType}">${r.status}</span>
          <span class="record-card-time">${r.timestamp}</span>
        </div>
      </div>
    `).join('');

    body.querySelectorAll('.record-card').forEach(card => {
      card.addEventListener('click', () => {
        activeRecordId = card.dataset.id;
        activeTab = 'uebersicht';
        renderAll();
      });
    });
  }

  function renderBreadcrumb() {
    const bc = document.getElementById('breadcrumb');
    const label = getEntityLabel(activeEntityType);
    const record = getActiveRecord();
    if (record) {
      bc.innerHTML = `
        <span>${label}</span>
        <span class="material-symbols-outlined">chevron_right</span>
        <span class="bc-active">${record.name}</span>
      `;
    } else {
      bc.innerHTML = `<span class="bc-active">${label}</span>`;
    }
  }

  function getActiveRecord() {
    const records = data[activeEntityType] || [];
    return records.find(r => r.id === activeRecordId) || null;
  }

  function renderDetail() {
    const record = getActiveRecord();

    const empty = document.getElementById('emptyState');

    } else if (activeEntityType === 'staff') {
      detailHtml = renderStaffDetail(record);
    } else if (activeEntityType === 'reports') {
      detailHtml = renderReportDetail(record);
    } else if (activeEntityType === 'medication') {
      detailHtml = renderMedicationDetail(record);
    }

    content.innerHTML = `
      <div class="detail-header fade-in">
        <div class="detail-avatar">
          <span class="material-symbols-outlined">${icon}</span>
        </div>
        <div class="detail-header-info">
          <h2>${record.name}</h2>
          <p>${record.subtitle}</p>
          <span class="status-badge ${record.statusType}">${record.status}</span>
        </div>
      </div>
      ${tabsHtml}
      <div class="fade-in">${detailHtml}</div>
    `;

    content.querySelectorAll('.detail-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        activeTab = tab.dataset.tab;
        renderDetail();
      });
    });
  }

  function renderClientDetail(record) {
    const d = record.details;

    const uebersicht = `
      <div class="tab-content ${activeTab === 'uebersicht' ? 'active' : ''}" data-tab-content="uebersicht">
        <div class="detail-section">
          <div class="detail-section-title"><span class="material-symbols-outlined">info</span> Persönliche Daten</div>
          <div class="detail-grid">
            <div class="detail-field"><span class="detail-field-label">Geburtsdatum</span><span class="detail-field-value">${d.geburtsdatum}</span></div>
            <div class="detail-field"><span class="detail-field-label">Zimmer</span><span class="detail-field-value">${d.zimmer}</span></div>
            <div class="detail-field"><span class="detail-field-label">Pflegestufe</span><span class="detail-field-value">${d.pflegestufe}</span></div>
            <div class="detail-field"><span class="detail-field-label">Eintritt</span><span class="detail-field-value">${d.eintrittsdatum}</span></div>
            <div class="detail-field"><span class="detail-field-label">Hausarzt</span><span class="detail-field-value">${d.hausarzt}</span></div>
            <div class="detail-field"><span class="detail-field-label">Kontaktperson</span><span class="detail-field-value">${d.kontakt}</span></div>
            <div class="detail-field"><span class="detail-field-label">Krankenkasse</span><span class="detail-field-value">${d.krankenkasse}</span></div>
            <div class="detail-field"><span class="detail-field-label">AHV-Nr.</span><span class="detail-field-value">${d.ahv}</span></div>
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title"><span class="material-symbols-outlined">medical_information</span> Diagnosen</div>
          <div class="detail-tag-list">
            ${d.diagnosen.map(diag => `<span class="detail-tag">${diag}</span>`).join('')}
          </div>
        </div>
      </div>
    `;

    const pflege = `
      <div class="tab-content ${activeTab === 'pflege' ? 'active' : ''}" data-tab-content="pflege">
        <div class="detail-section">
          <div class="detail-section-title"><span class="material-symbols-outlined">medical_information</span> Diagnosen</div>
          <div class="detail-tag-list">
            ${d.diagnosen.map(diag => `<span class="detail-tag">${diag}</span>`).join('')}
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title"><span class="material-symbols-outlined">medication</span> Aktuelle Medikation</div>
          <table class="med-table">
            <thead><tr><th>Medikament</th><th>Dosierung</th><th>Hinweis</th></tr></thead>
            <tbody>
              ${(record.medications || []).map(m => `<tr><td>${m.name}</td><td>${m.dosierung}</td><td>${m.hinweis || '–'}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;

    const dokumente = `
      <div class="tab-content ${activeTab === 'dokumente' ? 'active' : ''}" data-tab-content="dokumente">
        <div class="detail-section">
          <div class="detail-section-title"><span class="material-symbols-outlined">folder</span> Verknüpfte Dokumente</div>
          ${(record.documents || []).map(doc => `
            <div class="doc-item">
              <div class="doc-item-icon"><span class="material-symbols-outlined">description</span></div>
              <div class="doc-item-info">
                <div class="doc-item-name">${doc.name}</div>
                <div class="doc-item-meta">${doc.type} · ${doc.date}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;

    const aktivitaet = `
      <div class="tab-content ${activeTab === 'aktivitaet' ? 'active' : ''}" data-tab-content="aktivitaet">
        <div class="detail-section">
          <div class="detail-section-title"><span class="material-symbols-outlined">timeline</span> Letzte Aktivitäten</div>
          <div class="timeline">
            ${(record.timeline || []).map(t => `
              <div class="timeline-item">
                <div class="timeline-icon"><span class="material-symbols-outlined">${t.icon}</span></div>
                <div class="timeline-content">
                  <div class="timeline-title">${t.title}</div>
                  <div class="timeline-desc">${t.desc}</div>
                </div>
                <div class="timeline-time">${t.time}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;

    return uebersicht + pflege + dokumente + aktivitaet;
  }

  function renderDocumentationDetail(record) {
    const d = record.details;
    const fields = Object.entries(d).map(([key, val]) => {
      const labels = {
        typ: 'Typ', wohngruppe: 'Wohngruppe', zeitraum: 'Zeitraum', verfasser: 'Verfasser',
        klienten: 'Klienten', besonderheiten: 'Besonderheiten', massnahmen: 'Massnahmen',
        klient: 'Klient', datum: 'Datum', ort: 'Ort', beschreibung: 'Beschreibung',
        schichtwechsel: 'Schichtwechsel', empfaenger: 'Empfänger', offenePunkte: 'Offene Punkte',
        letztesUpdate: 'Letztes Update', ziel: 'Ziel', schmerzmanagement: 'Schmerzmanagement',
        ernaehrung: 'Ernährung', thema: 'Thema', dozent: 'Dozent', teilnehmer: 'Teilnehmer',
        dauer: 'Dauer', inhalt: 'Inhalt'
      };
      return `<div class="detail-field"><span class="detail-field-label">${labels[key] || key}</span><span class="detail-field-value">${val}</span></div>`;
    }).join('');

    return `
      <div class="detail-section">
        <div class="detail-section-title"><span class="material-symbols-outlined">info</span> Details</div>
        <div class="detail-grid">${fields}</div>
      </div>
    `;
  }

  function renderStaffDetail(record) {
    const d = record.details;
    return `
      <div class="detail-section">
        <div class="detail-section-title"><span class="material-symbols-outlined">info</span> Mitarbeiterdaten</div>
        <div class="detail-grid">
          <div class="detail-field"><span class="detail-field-label">Funktion</span><span class="detail-field-value">${d.funktion}</span></div>
          <div class="detail-field"><span class="detail-field-label">Abteilung</span><span class="detail-field-value">${d.abteilung}</span></div>
          <div class="detail-field"><span class="detail-field-label">Pensum</span><span class="detail-field-value">${d.pensum}</span></div>
          <div class="detail-field"><span class="detail-field-label">Eintritt</span><span class="detail-field-value">${d.eintrittsdatum}</span></div>
          <div class="detail-field"><span class="detail-field-label">Telefon</span><span class="detail-field-value">${d.telefon}</span></div>
          <div class="detail-field"><span class="detail-field-label">E-Mail</span><span class="detail-field-value">${d.email}</span></div>
          <div class="detail-field"><span class="detail-field-label">Überstunden</span><span class="detail-field-value">${d.ueberstunden}</span></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title"><span class="material-symbols-outlined">school</span> Qualifikationen</div>
        <div class="detail-tag-list">
          ${(d.qualifikationen || []).map(q => `<span class="detail-tag">${q}</span>`).join('')}
        </div>
      </div>
    `;
  }

  function renderReportDetail(record) {
    const d = record.details;
    const labels = {
      typ: 'Typ', zeitraum: 'Zeitraum', verfasser: 'Verfasser', belegung: 'Belegung',
      personalAbwesenheit: 'Personal-Abwesenheit', vorfaelle: 'Vorfälle', kosten: 'Kosten',
      bewohnerzufriedenheit: 'Bewohnerzufriedenheit', pflegequalitaet: 'Pflegequalität',
      verbesserungen: 'Verbesserungen', auditergebnis: 'Auditergebnis', gesamtStuerze: 'Stürze gesamt',
      mitVerletzung: 'Mit Verletzung', risikogruppe: 'Risikogruppe', massnahmen: 'Massnahmen',
      personalbestand: 'Personalbestand', ferienAbwesenheiten: 'Ferien/Abwesenheiten',
      offeneSchichten: 'Offene Schichten', handlungsbedarf: 'Handlungsbedarf'
    };

    const fields = Object.entries(d).map(([key, val]) =>
      `<div class="detail-field"><span class="detail-field-label">${labels[key] || key}</span><span class="detail-field-value">${val}</span></div>`
    ).join('');

    return `
      <div class="detail-section">
        <div class="detail-section-title"><span class="material-symbols-outlined">info</span> Berichtsdetails</div>
        <div class="detail-grid">${fields}</div>
      </div>
    `;
  }

  function renderMedicationDetail(record) {
    const d = record.details;
    return `
      <div class="detail-section">
        <div class="detail-section-title"><span class="material-symbols-outlined">info</span> Medikationsdetails</div>
        <div class="detail-grid">
          <div class="detail-field"><span class="detail-field-label">Wirkstoff</span><span class="detail-field-value">${d.wirkstoff}</span></div>
          <div class="detail-field"><span class="detail-field-label">Dosierung</span><span class="detail-field-value">${d.dosierung}</span></div>
          <div class="detail-field"><span class="detail-field-label">Klient</span><span class="detail-field-value">${d.klient}</span></div>
          <div class="detail-field"><span class="detail-field-label">Verordnet durch</span><span class="detail-field-value">${d.verordnet}</span></div>
          <div class="detail-field"><span class="detail-field-label">Seit</span><span class="detail-field-value">${d.seit}</span></div>
          <div class="detail-field"><span class="detail-field-label">Nächste Kontrolle</span><span class="detail-field-value">${d.naechsteKontrolle}</span></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title"><span class="material-symbols-outlined">info</span> Hinweise</div>
        <p style="font-size:14px;color:var(--md-sys-color-on-surface);line-height:1.6;">${d.hinweise}</p>
      </div>
      <div class="detail-section">
        <div class="detail-section-title"><span class="material-symbols-outlined">warning</span> Interaktionen</div>
        <p style="font-size:14px;color:var(--md-sys-color-on-surface);line-height:1.6;">${d.interaktionen}</p>
      </div>
    `;
  }

  function renderAIPanel() {
    const record = getActiveRecord();
    const contextLabel = document.getElementById('aiContextLabel');
    const body = document.getElementById('aiPanelBody');

    if (!record) {
      contextLabel.textContent = 'Kein Datensatz ausgewählt';
      body.innerHTML = `
        <div class="empty-state">
          <span class="material-symbols-outlined">psychology</span>
          <p>Wählen Sie einen Datensatz aus, um kontextbezogene Vorschläge zu erhalten.</p>
        </div>
      `;
      return;
    }

    contextLabel.textContent = record.name;

    const suggestions = aiSuggestions[record.id] || [];
    if (suggestions.length === 0) {
      body.innerHTML = `
        <div class="empty-state">
          <span class="material-symbols-outlined">check_circle</span>
          <p>Keine Vorschläge für diesen Datensatz.</p>
        </div>
      `;
      return;
    }

    body.innerHTML = suggestions.map((s, i) => `
      <div class="ai-suggestion fade-in" style="animation-delay: ${i * 0.06}s">
        <div class="ai-suggestion-header">
          <span class="material-symbols-outlined ai-suggestion-icon-${s.iconType}">${s.icon}</span>
          <span class="ai-suggestion-title">${s.title}</span>
        </div>
        <div class="ai-suggestion-desc">${s.desc}</div>
        ${s.action ? `<button class="ai-suggestion-action"><span class="material-symbols-outlined">arrow_forward</span> ${s.action}</button>` : ''}
      </div>
    `).join('');
  }

  function renderAll() {
    renderNav();
    renderList();
    renderBreadcrumb();
    renderDetail();
    renderAIPanel();
  }

  // =====================================================
  // EVENT HANDLERS
  // =====================================================

  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderList();
  });

  document.getElementById('aiToggleBtn').addEventListener('click', () => {
    aiPanelVisible = !aiPanelVisible;
    const panel = document.getElementById('aiPanel');
    const btn = document.getElementById('aiToggleBtn');
    if (aiPanelVisible) {
      panel.classList.remove('hidden');
      btn.classList.add('active');
    } else {
      panel.classList.add('hidden');
      btn.classList.remove('active');
    }
  });

  document.getElementById('aiChatInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.value.trim()) {
      const question = e.target.value.trim();
      e.target.value = '';

      const body = document.getElementById('aiPanelBody');
      const record = getActiveRecord();
      const recordName = record ? record.name : 'unbekannt';

      const responseDiv = document.createElement('div');
      responseDiv.className = 'ai-suggestion fade-in';
      responseDiv.innerHTML = `
        <div class="ai-suggestion-header">
          <span class="material-symbols-outlined ai-suggestion-icon-info">chat</span>
          <span class="ai-suggestion-title">Ihre Frage</span>
        </div>
        <div class="ai-suggestion-desc" style="font-style:italic;">"${question}"</div>
        <div class="ai-suggestion-desc" style="margin-top:8px;">Dies ist ein Prototyp. In der fertigen Version würde hier eine kontextbezogene Antwort zu <strong>${recordName}</strong> erscheinen.</div>
      `;
      body.appendChild(responseDiv);
      body.scrollTop = body.scrollHeight;
    }
  });

  // =====================================================
  // INIT
  // =====================================================

  renderAll();
</script>

</body>
</html>
